name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    if: github.repository == 'QTSurfer/lastra-ts'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org/'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: success()
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "## @qtsurfer/lastra@${VERSION}

          **npm:** [\`@qtsurfer/lastra@${VERSION}\`](https://www.npmjs.com/package/@qtsurfer/lastra/v/${VERSION})
          **Install:** \`npm install @qtsurfer/lastra@${VERSION}\`" \
            || echo "Release already exists"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
